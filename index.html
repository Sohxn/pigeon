    <div id="root"></div>

    <!-- liquid glass attempt #idek at this point -->
              <div id="lg-filters" aria-hidden="true"
       style="position:absolute;width:0;height:0;overflow:hidden;">
    <svg xmlns="http://www.w3.org/2000/svg">
      <defs>

        <filter id="lg-distort"
                x="-20%" y="-20%" width="140%" height="140%"
                color-interpolation-filters="sRGB">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.65 0.75"
            numOctaves="3"
            seed="5"
            result="noise" />
          <feDisplacementMap
            in="SourceGraphic" in2="noise"
            scale="8"
            xChannelSelector="R"
            yChannelSelector="G" />
        </filter>

        <filter id="lg-distort-edge"
                x="-30%" y="-30%" width="160%" height="160%"
                color-interpolation-filters="sRGB">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.55 0.65"
            numOctaves="4"
            seed="8"
            result="noise" />
          <feDisplacementMap
            in="SourceGraphic" in2="noise"
            scale="28"
            xChannelSelector="R"
            yChannelSelector="G" />
        </filter>

      </defs>
    </svg>
  </div>
